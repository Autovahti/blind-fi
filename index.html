<!doctype html>
<html lang="fi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BLND AI - sivusto rakenteilla</title>
    <meta name="description" content="Alkuvaiheen työnimisivusto on rakenteilla." />
    <meta name="theme-color" content="#0d0d0d" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/blind-ai-icon.png" type="image/png" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="construction">
        <img
          class="brand-mark"
          src="icons/blind-ai-icon.png"
          alt="BLND AI -tyylitelty logo"
        />
        <h1>Sivusto on rakenteilla</h1>
        <p class="lead">
          Tämä on alkuvaiheen työnimisivusto. Projektin nimeä ja mahdollista tulevaa
          käyttöä selvitetään ennen kuin sivustoa avataan laajemmin.
        </p>

        <div class="status-row" aria-label="Sivuston tila">
          <span>Tilanne</span>
          <strong>Rakenteilla</strong>
        </div>
      </section>
    </main>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("service-worker.js");
        });
      }
    </script>
  </body>
</html>
