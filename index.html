<!doctype html>
<html lang="fi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blind AI - sivusto rakenteilla</title>
    <meta name="description" content="Blind AI -sivusto on rakenteilla." />
    <meta name="theme-color" content="#0d0d0d" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/blind-ai-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="construction">
        <p class="kicker">Blind AI</p>
        <h1>Sivusto on rakenteilla</h1>
        <p class="lead">Blind AI:n julkista sivustoa valmistellaan parhaillaan.</p>
        <p class="note">
          Lisää tietoa julkaistaan myöhemmin, kun kokonaisuus on valmis näytettäväksi.
        </p>

        <div class="status-row" aria-label="Sivuston tila">
          <span>Tilanne</span>
          <strong>Rakenteilla</strong>
        </div>
      </section>
    </main>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("service-worker.js");
        });
      }
    </script>
  </body>
</html>
